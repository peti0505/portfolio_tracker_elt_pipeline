x-airflow-common: &airflow-common
  build:
    context: ./airflow/
    dockerfile: Dockerfile
  image: docker_airflow:latest
  env_file: .env
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/config:/opt/airflow/config
    - ./airflow/plugins:/opt/airflow/plugins
    - /var/run/docker.sock:/var/run/docker.sock

services:
  portfolio_extract_load:
    image: portfolio_extract_load:latest
    build:
      context: ./extract_load/
      dockerfile: Dockerfile
    profiles:
      - portfolio_pipeline
    env_file: .env
    volumes:
      - ./gcp_key.json:/extract_load/gcp_key.json
      - ./python_logs:/extract_load/python_logs

  portfolio_dbt_modeling:
    image: portfolio_dbt_modeling:latest
    build:
      context: ./modeling/
      dockerfile: Dockerfile
    profiles:
      - portfolio_pipeline
    env_file: .env
    volumes:
      - ./gcp_key.json:/modeling/gcp_key.json
      - ./profiles.yml:/root/.dbt/profiles.yml
    depends_on:
      portfolio_extract_load:
        condition: service_completed_successfully

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data

  airflow-init:
    command: version
    <<: *airflow-common
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
    depends_on:
      - postgres

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-db-volume:
